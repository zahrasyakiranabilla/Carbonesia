info:
  name: 06 Reset Password
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/api/auth/reset-password"
  body:
    type: json
    data: |-
      {
        "reset_token": "{{resetToken}}",
        "new_password": "{{newPassword}}"
      }
  headers:
    Content-Type: application/json

settings:
  encodeUrl: true