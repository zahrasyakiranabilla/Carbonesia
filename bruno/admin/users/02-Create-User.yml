info:
  name: 02 Create User
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/users"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}",
        "name": "{{name}}",
        "role": "{{role}}",
        "active": true
      }
  headers:
    Authorization: "Bearer {{accessToken}}"
    Content-Type: application/json

settings:
  encodeUrl: true
