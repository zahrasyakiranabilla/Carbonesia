info:
  name: 03 Update User
  type: http
  seq: 3

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/admin/users/{{userId}}"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "name": "{{name}}",
        "role": "{{role}}",
        "active": {{active}}
      }
  headers:
    Authorization: "Bearer {{accessToken}}"
    Content-Type: application/json

settings:
  encodeUrl: true
